# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - interviewprep-api-derz

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Restore API project
        run: dotnet restore InterviewPrep.Api/InterviewPrep.Api.csproj

      - name: Build API project
        run: dotnet build InterviewPrep.Api/InterviewPrep.Api.csproj --configuration Release --no-restore

      - name: Publish API project
        run: dotnet publish InterviewPrep.Api/InterviewPrep.Api.csproj --configuration Release --no-build --output ${{ env.DOTNET_ROOT }}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EB17090BF54C419396F616E477AEAECC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1268BB3AA2464D8B8BA25E50FF69FCD3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AF76044DEAA4487EBB4A79F9738B943B }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: interviewprep-api-derz
          slot-name: Production
          package: .
